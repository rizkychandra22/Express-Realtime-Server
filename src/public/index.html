<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Learning Realtime Chat</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 20px auto; display: flex; flex-direction: column; gap: 10px; background-color: #f4f7f6; }
        .container { display: flex; gap: 20px; height: 500px; }
        
        #sidebar { width: 280px; border: 1px solid #ddd; border-radius: 12px; padding: 15px; background: #fff; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .user-item { padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; background: #f8f9fa; border: 1px solid transparent; transition: all 0.2s; }
        .user-item:hover { background: #e9ecef; border-color: #dee2e6; }
        .user-item.selected { background: #2c3e50; color: white; }
        .user-item small { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; opacity: 0.8; }

        #main-chat { flex-grow: 1; display: flex; flex-direction: column; }
        #chat-box { border: 1px solid #ddd; flex-grow: 1; overflow-y: auto; padding: 15px; background: #fff; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .msg { margin-bottom: 12px; padding: 10px 15px; border-radius: 12px; background: #f1f3f5; max-width: 80%; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: #2c3e50; color: white; border-bottom-right-radius: 2px; }
        .msg:not(.me) { border-bottom-left-radius: 2px; }
        .admin { border-left: 4px solid #e74c3c; }
        .student { border-left: 4px solid #3498db; }

        .input-area { display: flex; gap: 10px; background: #fff; padding: 10px; border-radius: 12px; border: 1px solid #ddd; }
        input { padding: 12px; border: none; flex-grow: 1; outline: none; font-size: 14px; }
        button { padding: 10px 25px; background: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        #login-area { border: 1px solid #ddd; padding: 30px; border-radius: 12px; background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        #login-area input { border: 1px solid #ddd; margin-bottom: 10px; width: 80%; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>
    <h2 style="color: #2c3e50; text-align: center;">Portal Chat Akademik</h2>
    
    <div id="status-bar" style="text-align: center; font-size: 14px; color: #7f8c8d;">
        ● <span id="status">Terputus</span> | Aktif: <span id="online-count">0</span>
    </div>

    <div id="login-area">
        <h3 style="margin-top: 0;">Silahkan Login</h3>
        <input type="text" id="user-login" placeholder="Username">
        <input type="password" id="pass-login" placeholder="Password">
        <button onclick="doLogin()">Masuk ke Sistem</button>
    </div>

    <div class="container" id="chat-container" style="display: none;">
        <div id="sidebar">
            <h4 style="margin-top: 0; color: #2c3e50; border-bottom: 2px solid #f1f3f5; padding-bottom: 10px;">Daftar Pengguna</h4>
            <div id="user-list"></div>
        </div>

        <div id="main-chat">
            <h4 id="chat-with-title" style="margin-top: 0; color: #34495e;">Pilih teman bicara...</h4>
            <div id="chat-box" style="display: flex; flex-direction: column;"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Tulis pesan anda..." disabled>
                <button id="send-btn" onclick="sendMessage()" disabled>Kirim</button>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let selectedUserSocketId = null;
        let myName = "";

        async function doLogin() {
            const username = document.getElementById('user-login').value;
            const password = document.getElementById('pass-login').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    myName = data.user.name; // Mengambil Nama Lengkap
                    connectSocket(data.token);
                    document.getElementById('login-area').style.display = 'none';
                    document.getElementById('chat-container').style.display = 'flex';
                } else {
                    alert("Gagal: " + (data.message || "Credential salah"));
                }
            } catch (err) {
                alert("Kesalahan koneksi server!");
            }
        }

        function connectSocket(token) {
            socket = io({ auth: { token } });

            socket.on('connect', () => {
                document.getElementById('status').innerText = "Terhubung sebagai " + myName;
                document.getElementById('status').style.color = "#27ae60";
            });

            socket.on('online_list', (users) => {
                renderUserList(users);
                document.getElementById('online-count').innerText = users.length;
            });

            socket.on('receive_message', (data) => {
                const box = document.getElementById('chat-box');
                const isMe = data.user === myName;
                const msgClass = isMe ? 'me' : (data.role === 'admin' ? 'admin' : 'student');
                
                box.innerHTML += `
                    <div class="msg ${msgClass}">
                        <div style="font-size: 11px; font-weight: bold; margin-bottom: 4px; opacity: 0.8;">
                            ${isMe ? 'Anda' : data.user} • ${data.time}
                        </div>
                        ${data.text}
                    </div>
                `;
                box.scrollTop = box.scrollHeight;
            });

            socket.on('connect_error', (err) => {
                alert("Sesi berakhir: " + err.message);
                location.reload();
            });
        }

        function renderUserList(users) {
            const listDiv = document.getElementById('user-list');
            listDiv.innerHTML = "";
            
            users.forEach(user => {
                if(user.name === myName) return; // Sembunyikan diri sendiri

                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `<strong>${user.name}</strong><small>${user.role}</small>`;
                div.onclick = (e) => selectUser(user, e.currentTarget);
                listDiv.appendChild(div);
            });
        }

        function selectUser(user, element) {
            selectedUserSocketId = user.socketId;
            document.getElementById('chat-with-title').innerText = "Percakapan dengan: " + user.name;
            document.getElementById('message-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            if (input.value.trim() !== "") {
                // Untuk tahap ini masih broadcast ke semua
                socket.emit('send_message', input.value);
                input.value = "";
            }
        }
    </script>
</body>
</html>
